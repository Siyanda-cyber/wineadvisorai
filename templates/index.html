<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Advisor 🍷</title>
<style>
    body { 
        font-family: Arial, sans-serif; 
        background: #fafafa; 
        padding: 20px; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
    }
    #chatbox { 
        max-width: 600px; 
        width: 100%;
        background: #fff; 
        padding: 30px; 
        border-radius: 15px; 
        box-shadow: 0px 0px 15px rgba(0,0,0,0.1); 
        text-align: center;
    }
    h1 { 
        color: #8B0000; 
        font-size: 2rem; 
        margin-bottom: 15px; 
    }
    p { 
        font-size: 1rem; 
        color: #333; 
        margin-bottom: 20px; 
    }
    input[type=text] { 
        width: 70%; 
        padding: 10px; 
        margin-right: 10px; 
        border-radius: 5px; 
        border: 1px solid #ccc; 
    }
    button { 
        padding: 10px 15px; 
        border: none; 
        background: #8B0000; 
        color: white; 
        border-radius: 5px; 
        cursor: pointer; 
    }
    button:hover { 
        background: #a00000; 
    }
    #output { 
        margin-top: 25px; 
        white-space: pre-line; 
        text-align: left;
    }
</style>
</head>
<body>
<div id="chatbox">
    <h1>Welcome to Wine Advisory 🍷</h1>
    <p>Type a South African dish below to get Western Cape wine recommendations:</p>
    <input type="text" id="dishInput" placeholder="e.g., boerewors">
    <button onclick="sendDish()">Get Wine</button>
    <div id="output"></div>
</div>

<script>
async function sendDish() {
    const dish = document.getElementById("dishInput").value.trim();
    if (!dish) return;

    const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: dish })
    });

    const data = await response.json();
    document.getElementById("output").textContent = data.reply;
}
</script>
</body>
</html>
