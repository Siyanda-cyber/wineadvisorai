<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bot Tester</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
    input { width: 80%; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>
<body>

<h2>Bot Tester</h2>
<div id="chat"></div>
<input type="text" id="msg" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const message = input.value.trim();
  if (!message) return;

  // Display user's message
  const userMsg = document.createElement("div");
  userMsg.className = "user";
  userMsg.textContent = "You: " + message;
  chat.appendChild(userMsg);
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch("https://wineadvisorai.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    // Display bot's reply
    const botMsg = document.createElement("div");
    botMsg.className = "bot";
    botMsg.textContent = "Bot: " + (data.reply || "No response");
    chat.appendChild(botMsg);
    chat.scrollTop = chat.scrollHeight;

  } catch (error) {
    const botMsg = document.createElement("div");
    botMsg.className = "bot";
    botMsg.textContent = "Bot: Error connecting to bot";
    chat.appendChild(botMsg);
    chat.scrollTop = chat.scrollHeight;
  }

  input.value = "";
}
</script>

</body>
</html>
